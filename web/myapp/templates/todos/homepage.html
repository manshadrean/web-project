{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page Template</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <div class="container">
      <header class="navbar">
        <div class="logo">
          <i class="fa-solid fa-circle-check"></i>
          <span>YOUR LOGO</span>
        </div>
        <nav class="nav-links">
          <a href="#" class="active">Home</a>
          <a href="#">Services</a>
          <a href="#">Pricing</a>
          <a href="#">Clients</a>
          <a href="#">News</a>
          <a href="#">Contact</a>
        </nav>
      </header>

      <section class="hero">
        <div class="hero-text">
          <h1>GET HELP WITH CODING<br />FROM ENGINEERS.</h1>
          <p>
            LEARN HOW TO CODE EFFICIENTLY AND CREATE<br />APPS AND GAMES THAT
            WORK. CONSULT WITH BEST<br />EXPERTS TO APPLY SKILLS IN ACTION.
          </p>
          <div class="hero-buttons">
            <a href="#" class="btn btn-primary">LEARNING NOW</a>
            <a href="#" class="btn btn-primary"
              ><i class="fa-regular fa-circle-play"></i> WATCH NOW</a
            >
          </div>
        </div>

        <div class="hero-image">
          <img
            src="https://cdni.iconscout.com/illustration/premium/thumb/web-development-3454628-2918517.png"
            alt="Coding Illustration"
          />
        </div>
      </section>
    </div>
  </body>
</html>
